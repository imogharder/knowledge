  const [content, setContent] = useState(entry?.content || "");

  const save = () => {
    if (!title.trim() || !content.trim()) return;
    onSave({
      ...entry,
      id: entry?.id || `custom_${Date.now()}`,
      title: title.trim(),
      summary: summary.trim(),
      content: content.trim(),
      tags: tags.split(",").map(t => t.trim()).filter(Boolean),

// ── SEARCH BAR ─────────────────────────────────────────────
function SearchBar({ allData, onSelect, color }) {
  const [q, setQ] = useState("");
  const results = useMemo(() => {
    if (q.length < 2) return [];
    const out = [];
    Object.entries(allData).forEach(([pillKey, pill]) => {
      Object.entries(pill.categories).forEach(([catKey, cat]) => {
        cat.entries.forEach(entry => {
          const text = `${entry.title} ${entry.summary} ${entry.tags?.join(" ")}`.toLowerCase();
          if (text.includes(q.toLowerCase())) {
            out.push({ entry, pill, cat, pillKey, catKey });
          }
        });
      });
    });
    return out.slice(0, 8);
  }, [q, allData]);

  return (
    <div style={{ position:"relative" }}>
      <input value={q} onChange={e=>setQ(e.target.value)} placeholder="search all knowledge..."
        style={{ background:"#0c0c12", border:`1px solid #1a1a24`, borderRadius:8, color:"#ddd", padding:"9px 14px", fontSize:11, fontFamily:"'JetBrains Mono',monospace", width:230, outline:"none", transition:"border-color 0.15s" }}
        onFocus={e=>e.target.style.borderColor=color+"55"}
        onBlur={e=>{ e.target.style.borderColor="#1a1a24"; setTimeout(()=>setQ(""),150); }}
      />
      {results.length > 0 && (
        <div style={{ position:"absolute", top:"110%", right:0, width:360, background:"#0d0d14", border:"1px solid #1a1a24", borderRadius:10, zIndex:100, maxHeight:320, overflowY:"auto", boxShadow:"0 12px 40px rgba(0,0,0,0.9)" }}>
          {results.map((r,i) => (
            <div key={i} onClick={()=>{ onSelect(r); setQ(""); }}
              style={{ padding:"10px 14px", borderBottom:"1px solid #0f0f16", cursor:"pointer" }}
              onMouseEnter={e=>e.currentTarget.style.background="#111118"}
              onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
              <div style={{ fontSize:12, color:"#ddd", marginBottom:3 }}>{r.entry.title}</div>
              <div style={{ display:"flex", gap:8 }}>
                <span style={{ fontSize:9, color:r.pill.color+"88", fontFamily:"'JetBrains Mono',monospace" }}>{r.pill.label}</span>
                <span style={{ fontSize:9, color:"#2a2a35", fontFamily:"'JetBrains Mono',monospace" }}>→ {r.cat.label}</span>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── MAIN APP ───────────────────────────────────────────────
function App() {
  const [data, setData] = useState(() => LS.get("kc_data") || KNOWLEDGE_BASE);
  const [activePill, setActivePill] = useState("blackpill");
  const [selectedEntry, setSelectedEntry] = useState(null);
  const [selectedEntryColor, setSelectedEntryColor] = useState(null);
  const [editingEntry, setEditingEntry] = useState(null);
  const [editingCat, setEditingCat] = useState(null);
  const [showAddCat, setShowAddCat] = useState(false);
  const [search, setSearch] = useState("");
  const [saveFlash, setSaveFlash] = useState(false);

  const pill = data[activePill];

  useEffect(() => {
    LS.set("kc_data", data);
    setSaveFlash(true);
    const t = setTimeout(()=>setSaveFlash(false), 1000);
    return ()=>clearTimeout(t);
  }, [data]);

  const totalEntries = useMemo(() =>
    Object.values(data).reduce((s,p)=>s+Object.values(p.categories).reduce((ss,c)=>ss+c.entries.length,0),0),
  [data]);

  // Save / update entry
  const saveEntry = (catId, entry) => {
    setData(prev => {
      const pill = { ...prev[activePill] };
      const cat = { ...pill.categories[catId] };
      const idx = cat.entries.findIndex(e=>e.id===entry.id);
      if (idx>=0) {
        cat.entries = [...cat.entries];
        cat.entries[idx] = entry;
      } else {
        cat.entries = [...cat.entries, entry];
      }
      return { ...prev, [activePill]: { ...pill, categories: { ...pill.categories, [catId]: cat } } };
    });
    setEditingEntry(null);
    setSelectedEntry(entry);
  };

  const deleteEntry = (catId, entryId) => {
    setData(prev => {
      const pill = { ...prev[activePill] };
      const cat = { ...pill.categories[catId] };
      cat.entries = cat.entries.filter(e=>e.id!==entryId);
      return { ...prev, [activePill]: { ...pill, categories: { ...pill.categories, [catId]: cat } } };
    });
    setSelectedEntry(null);
  };

  const addCategory = ({ name, icon, color }) => {
    const id = name.toLowerCase().replace(/\s+/g,"_") + "_" + Date.now();
    setData(prev => ({
      ...prev,
      [activePill]: {
        ...prev[activePill],
        categories: {
          ...prev[activePill].categories,
          [id]: { label: name, icon, color, entries: [] }
        }
      }
    }));
    setShowAddCat(false);
  };

  const handleSearchSelect = ({ entry, cat, pillKey }) => {
    setActivePill(pillKey);
    setTimeout(() => {
      setSelectedEntry(entry);
      setSelectedEntryColor(cat.color);
      setEditingCat(null);
    }, 50);
  };

  // Find catId for selected entry
  const findCatForEntry = (entryId) => {
    const cats = data[activePill]?.categories || {};
    for (const [catId, cat] of Object.entries(cats)) {
      if (cat.entries.find(e=>e.id===entryId)) return catId;
    }
    return null;
  };

  const selectedCatId = selectedEntry ? findCatForEntry(selectedEntry.id) : null;

  return (
    <div style={{ minHeight:"100vh", background:"#060608", fontFamily:"'Space Grotesk',sans-serif", color:"#e8e8e8", paddingBottom:80 }}>

      {/* Modals */}
      {editingEntry && (
        <EntryEditor
          entry={editingEntry.entry}
          color={pill.color}
          onSave={(e)=>saveEntry(editingEntry.catId, e)}
          onClose={()=>setEditingEntry(null)}
        />
      )}
      {showAddCat && <AddCatModal color={pill.color} onAdd={addCategory} onClose={()=>setShowAddCat(false)}/>}
      {selectedEntry && selectedCatId && (
        <EntryDetail
          entry={selectedEntry}
          color={pill.color}
          catColor={selectedEntryColor}
          onClose={()=>setSelectedEntry(null)}
          onEdit={()=>{ setEditingEntry({ catId:selectedCatId, entry:selectedEntry }); setSelectedEntry(null); }}
          onDelete={()=>deleteEntry(selectedCatId, selectedEntry.id)}
        />
      )}

      {/* Ambient */}
      <div style={{ position:"fixed", inset:0, background:`radial-gradient(ellipse at 0% 0%,${pill.glow},transparent 50%),radial-gradient(ellipse at 100% 100%,${pill.color}08,transparent 50%)`, pointerEvents:"none", transition:"background 0.7s", zIndex:0 }}/>

      {/* Save flash */}
      {saveFlash && <div style={{ position:"fixed", bottom:20, right:20, background:"#0c0c12", border:"1px solid #1a1a24", borderRadius:7, padding:"5px 13px", fontSize:9, color:"#2a2a38", fontFamily:"'JetBrains Mono',monospace", zIndex:200 }}>saved ✓</div>}

      <div style={{ position:"relative", zIndex:1, maxWidth:1140, margin:"0 auto", padding:"26px 20px" }}>

        {/* Header */}
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-end", marginBottom:28, flexWrap:"wrap", gap:16 }}>
          <div>
            <div style={{ fontSize:9, color:pill.color, letterSpacing:4, fontFamily:"'JetBrains Mono',monospace", marginBottom:4 }}>KNOWLEDGE CUBE · FULL ENCYCLOPEDIA</div>
            <h1 style={{ fontWeight:700, fontSize:38, letterSpacing:2, color:"#fff", lineHeight:1 }}>
              KNOWLEDGE <span style={{ color:pill.color }}>BASE</span>
            </h1>
            <div style={{ fontSize:9, color:"#1e1e2a", marginTop:5, fontFamily:"'JetBrains Mono',monospace" }}>
              {totalEntries} ENTRIES TOTAL · CLICK ANY CARD TO READ FULL CONTENT · ALL DATA SAVED LOCALLY
            </div>
          </div>
          <SearchBar allData={data} onSelect={handleSearchSelect} color={pill.color}/>
        </div>

        {/* Cube faces */}
        <div style={{ display:"flex", gap:12, marginBottom:34, flexWrap:"wrap" }}>
          {PILL_ORDER.map(pk => <PillFace key={pk} pill={data[pk]} isActive={activePill===pk} onClick={()=>setActivePill(pk)}/>)}
        </div>

        {/* Active pill banner */}
        <div style={{ background:`linear-gradient(135deg,${pill.color}14,transparent)`, border:`1px solid ${pill.color}24`, borderLeft:`4px solid ${pill.color}`, borderRadius:10, padding:"14px 20px", marginBottom:20, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:10 }}>
          <div style={{ display:"flex", alignItems:"center", gap:12 }}>
            <span style={{ fontSize:24 }}>{pill.icon}</span>
            <div>
              <div style={{ fontWeight:700, fontSize:20, color:pill.color, letterSpacing:2 }}>{pill.label}</div>
              <div style={{ fontSize:11, color:"#2a2a38", fontFamily:"'JetBrains Mono',monospace", marginTop:2 }}>{pill.desc}</div>
            </div>
          </div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            <span style={{ fontSize:9, color:`${pill.color}77`, background:`${pill.color}10`, padding:"5px 12px", borderRadius:16, fontFamily:"'JetBrains Mono',monospace" }}>
              {Object.values(pill.categories).reduce((s,c)=>s+c.entries.length,0)} entries · {Object.keys(pill.categories).length} categories
            </span>
            <button onClick={()=>setShowAddCat(true)}
              style={{ padding:"7px 14px", background:"transparent", border:`1px solid ${pill.color}33`, borderRadius:7, color:`${pill.color}66`, fontSize:10, cursor:"pointer", fontFamily:"'JetBrains Mono',monospace", letterSpacing:1, transition:"all 0.15s" }}
              onMouseEnter={e=>{ e.target.style.borderColor=pill.color; e.target.style.color=pill.color; }}
              onMouseLeave={e=>{ e.target.style.borderColor=pill.color+"33"; e.target.style.color=pill.color+"66"; }}>
              + category
            </button>
          </div>
        </div>

        {/* Categories */}
        {Object.entries(pill.categories).map(([catId, cat]) => (
          <CategoryPanel
            key={catId}
            catId={catId}
            cat={cat}
            color={pill.color}
            entries={cat.entries}
            onEntryClick={(entry, catColor) => { setSelectedEntry(entry); setSelectedEntryColor(catColor); }}
            onAddEntry={() => setEditingEntry({ catId, entry: null })}
          />
        ))}

        {/* Bottom nav */}
        <div style={{ marginTop:28, display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap" }}>
          {PILL_ORDER.map(pk => {
            const p = data[pk];
            const count = Object.values(p.categories).reduce((s,c)=>s+c.entries.length,0);
            return (
              <div key={pk} onClick={()=>setActivePill(pk)}
                style={{ padding:"7px 18px", background:activePill===pk?`${p.color}18`:"#0c0c12", border:`1px solid ${activePill===pk?p.color+"77":"#14141e"}`, borderRadius:20, cursor:"pointer", display:"flex", alignItems:"center", gap:8, transition:"all 0.15s" }}
                onMouseEnter={e=>{ if(activePill!==pk) e.currentTarget.style.borderColor=p.color+"33"; }}
                onMouseLeave={e=>{ if(activePill!==pk) e.currentTarget.style.borderColor="#14141e"; }}>
                <span style={{ fontSize:13 }}>{p.icon}</span>
                <span style={{ fontSize:9, color:activePill===pk?p.color:"#2a2a38", fontFamily:"'JetBrains Mono',monospace" }}>{p.label}</span>
                <span style={{ fontSize:8, background:"#0f0f16", padding:"1px 6px", borderRadius:8, fontFamily:"'JetBrains Mono',monospace", color:activePill===pk?`${p.color}88`:"#1e1e28" }}>{count}</span>
              </div>
            );
          })}
        </div>

        <div style={{ textAlign:"center", marginTop:20, fontSize:9, color:"#0f0f18", letterSpacing:2, fontFamily:"'JetBrains Mono',monospace" }}>
          CLICK CARD → FULL CONTENT · EDIT / DELETE IN DETAIL VIEW · + ADD ENTRY BELOW EACH CATEGORY
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
